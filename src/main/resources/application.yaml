server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}

spring:
  application:
    name: ${APP_NAME}

  config:
    import: optional:file:BE/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

        jdbc:
          time_zone: ${APP_TIMEZONE}

  jackson:
    time-zone: ${APP_TIMEZONE}

jwt:
  signerKey: ${JWT_SIGNER_KEY}

springdoc:
  api-docs:
    enabled: true
    # OpenAPI JSON spec served at /api-docs.json (full URL: <context-path>/api-docs.json)
    path: /api-docs.json
  swagger-ui:
    enabled: true
    # Swagger UI served at /api-docs (full URL: <context-path>/api-docs)
    path: /api-docs
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true
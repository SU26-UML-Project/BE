server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}

spring:
  application:
    name: ${APP_NAME}

  config:
    import: optional:file:BE/.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

        jdbc:
          time_zone: ${APP_TIMEZONE}

  jackson:
    time-zone: ${APP_TIMEZONE}

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # Đường dẫn trả về JSON spec gốc
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Đường dẫn truy cập giao diện UI trên trình duyệt
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true
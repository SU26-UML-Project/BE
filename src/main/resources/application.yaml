server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${CONTEXT_PATH}

spring:
  application:
    name: ${APP_NAME}

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=disable
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
      timeout: ${REDIS_TIMEOUT:2000ms}

  jpa:
    hibernate:
      ddl-auto: create-drop

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

        jdbc:
          time_zone: ${APP_TIMEZONE}

  jackson:
    time-zone: ${APP_TIMEZONE}

  servlet:
    multipart:
      # Cho phép PDF tới 10MB lọt qua tới tầng service để chính validate của ta trả lỗi thân thiện.
      # Đặt cao hơn 10MB một chút để ngưỡng FILE_TOO_LARGE (10MB) là người gác cổng thực sự.
      max-file-size: 11MB
      max-request-size: 12MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/uml_ai_chat}

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  accessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}

supabase:
  # URL dự án Supabase, ví dụ https://xyz.supabase.co
  url: ${SUPABASE_URL}
  # Anon key (public) — không dùng ở backend, giữ để tham chiếu/đầy đủ cấu hình.
  anon-key: ${SUPABASE_ANON_KEY:}
  # service_role key — toàn quyền Storage, CHỈ dùng ở backend, KHÔNG lộ ra frontend.
  service-key: ${SUPABASE_SERVICE_KEY}

otp:
  # Thời gian sống của OTP đặt lại mật khẩu (giây).
  ttl-seconds: ${OTP_TTL_SECONDS:90}
  # Số lần nhập sai tối đa trước khi OTP bị vô hiệu hoá (chống brute-force).
  max-attempts: ${OTP_MAX_ATTEMPTS:5}
  # Thời gian giữ cờ "đã verify OTP" để cho phép đặt lại mật khẩu (giây).
  verified-ttl-seconds: ${OTP_VERIFIED_TTL_SECONDS:300}

app:
  frontend:
    # Trang chủ FE — dùng cho liên kết "quên mật khẩu" trong email xác nhận thiết lập tài khoản.
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  oauth2:
    frontend-callback-url: ${FRONTEND_CALLBACK_URL}
  auth:
    cookie:
      refresh-token-name: ${AUTH_COOKIE_NAME:refresh_token}
      # Bật true khi chạy HTTPS (production). Trên http://localhost để false.
      secure: ${AUTH_COOKIE_SECURE:false}
      # Lax cho dev (FE/BE cùng site localhost). Cross-site production dùng None + secure=true.
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
      path: ${AUTH_COOKIE_PATH:/}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs # Đường dẫn trả về JSON spec gốc
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # Đường dẫn truy cập giao diện UI trên trình duyệt
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  show-actuator: false
  default-produces-media-type: application/json
  servers:
    - url: https://diauml-be.onrender.com/api/uml
      description: Production
    - url: http://localhost:8088/api/uml
      description: Local

anything-llm:
  base-url: ${ANYTHING_LLM_BASE_URL:http://localhost:3001/api}
  api-key: ${ANYTHING_LLM_API_KEY}
  workspace-slug: ${ANYTHING_LLM_WORKSPACE_SLUG:uml-diagram}
  model-name: ${ANYTHING_LLM_MODEL_NAME:gemma4}

management:
  endpoints:
    web:
      exposure:
        include: health

  endpoint:
    health:
      show-details: always

  health:
    defaults:
      enabled: true